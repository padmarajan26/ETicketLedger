version: '3.9'

services:

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eticket_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "ETicket@12345!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'ETicket@12345!' -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eticket_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver;Database=ETicketLedgerDb;
        User Id=sa;Password=ETicket@12345!;TrustServerCertificate=True;
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eticket_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: on-failure

volumes:
  sqlserver_data:
